# ── docker-compose.yml — LOCAL DEVELOPMENT ONLY ──────────────────────────────
# For Coolify production: use the Dockerfile directly.
# Coolify manages PostgreSQL as a shared service — do NOT run this compose in production.

version: '3.9'

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-jmd_db}
      POSTGRES_USER:     ${DB_USER:-jmd_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jmd_localpass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jmd_user} -d ${DB_NAME:-jmd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"

volumes:
  postgres_data:
  media_files:
